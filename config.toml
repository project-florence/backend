[redis]
host = "localhost"
port = 5434
db = 0
decode_responses = true

[postgres]
host = "localhost"
port = 5433
user = "postgres"
default_db = "postgres"

[company_info]
cache_ttl = 86400
request_delay_min = 0.5
request_delay_max = 1.5
batch_size = 10
batch_delay = 5
max_retries = 3
retry_sleep_min = 1
retry_sleep_max = 3

[article_analyzer]
quick_report_article_limit = 10
deep_report_article_limit = 100
llm_url = "http://localhost:7777/v1"
llm_model = "gemma-e2b-full-think"

[gdelt_api]
max_records = 250
base_url = "https://api.gdeltproject.org/api/v2/doc/doc"
mode = "ArtList"
format = "json"
timeout = 30

[article_collector]
bigquery_project = "project-florence-1"
default_limit = 100
gdelt_gqg_table = "gdelt-bq.gdeltv2.gqg"
gdelt_gkg_table = "gdelt-bq.gdeltv2.gkg_partitioned"
cache_ttl = 3600

[get_bist_companies]
cache_interval = 2592000

[llm_client]
api_key = "dummy_api_key"

[generate_bist_mapping]
scrape_url = "https://borsacoo.com/firmalar"
user_agent = "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36"
timeout = 30
output_dir = "data"
output_filename = "bist_companies.json"

[price_history]
rate_limit_delay = 5.0

[economy]
api_url = "https://finans.truncgil.com/v3/today.json"
cache_ttl = 600

[halkarz]
base_url = "https://halkarz.com"
wp_api = "https://halkarz.com/wp-json/wp/v2/posts"
user_agent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
list_cache_ttl = 3600
detail_cache_ttl = 3600

[embedding]
base_url = "http://127.0.0.1:11434/v1"
api_key = "ollama"
model = "mxbai-embed-large"

[report]
quick_report_cost = 1
deep_report_cost = 5

[simulation]
per_day_cost = 0.005

[stock_vector]
ttl = 86400

[stock_vector.risk_tolerance_map]
low = 0.10
medium = 0.50
high = 0.90

[stock_vector.horizon_map]
short = 0.15
medium = 0.40
long = 0.70

[stock_vector.profitability_map]
low = 0.10
medium = 0.35
high = 0.70

[news_search]
search_url = "http://localhost:5435/search"
user_agent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
categories = "news"